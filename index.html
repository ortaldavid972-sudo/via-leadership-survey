<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title> VIA</title>
<style>
  :root {
    --bg: #000000;
    --surface: #121212;
    --accent: #D6FA1E;
    --accent-soft: #E8FC7A;
    --grow: #4A4A4A;
    --text: #FFFFFF;
    --text-dim: #9C9C9C;
    --line: #2B2B2B;

    --font-display: "Segoe UI", "Arial", "Tahoma", sans-serif;
    --font-body: "Segoe UI", "Arial", "Tahoma", sans-serif;
    --font-mono: "Cascadia Code", "SF Mono", "JetBrains Mono", ui-monospace, "Courier New", monospace;
  }

  * { box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    display: flex;
    justify-content: center;
    padding: 48px 16px 80px;
    min-height: 100vh;
    margin: 0;
  }
  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; animation: none !important; }
  }

  .console {
    width: 100%;
    max-width: 680px;
    background: var(--surface);
    border-radius: 4px;
    border: 1px solid var(--line);
    box-shadow: 0 1px 0 var(--line) inset, 0 20px 40px -28px rgba(0,0,0,0.5);
    position: relative;
    padding: 40px 44px;
  }
  .console .rivet-tl, .console .rivet-tr, .console .rivet-bl, .console .rivet-br {
    content: "";
    position: absolute;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--line);
  }
  .rivet-tl { top: 12px; left: 12px; }
  .rivet-tr { top: 12px; right: 12px; }
  .rivet-bl { bottom: 12px; left: 12px; }
  .rivet-br { bottom: 12px; right: 12px; }

  .plate {
    font-family: var(--font-display);
    letter-spacing: 0.02em;
    font-size: 11px;
    color: var(--text-dim);
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 18px;
  }
  .plate strong {
    color: var(--accent);
    font-weight: 700;
  }

  .ticks {
    display: flex;
    gap: 4px;
    margin-bottom: 28px;
  }
  .ticks .tick {
    height: 4px;
    flex: 1;
    background: var(--line);
    border-radius: 1px;
    transition: background 0.25s ease;
  }
  .ticks .tick.filled { background: var(--accent); }

  h1 {
    font-family: var(--font-display);
    font-size: 26px;
    letter-spacing: 0.01em;
    line-height: 1.25;
    margin: 0 0 6px;
    text-wrap: balance;
    font-weight: 700;
  }
  h2 {
    font-family: var(--font-display);
    font-size: 13px;
    color: var(--accent);
    margin: 0 0 4px;
    font-weight: 700;
  }
  .sub {
    font-size: 14.5px;
    color: var(--text-dim);
    line-height: 1.6;
    max-width: 46ch;
    margin: 0 0 22px;
  }

  .field-label {
    font-family: var(--font-display);
    font-size: 12px;
    color: var(--text-dim);
    display: block;
    margin-bottom: 8px;
  }
  input[type="text"] {
    width: 100%;
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--line);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 16px;
    padding: 6px 2px;
    margin-bottom: 26px;
  }
  input[type="text"]:focus {
    outline: none;
    border-bottom-color: var(--accent);
  }

  .module-name {
    font-family: var(--font-display);
    font-size: 13px;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 4px;
  }
  .module-hint {
    font-size: 12.5px;
    color: var(--text-dim);
    margin-bottom: 22px;
  }

  .statement {
    margin-bottom: 26px;
  }
  .statement p {
    font-size: 16.5px;
    line-height: 1.55;
    margin: 0 0 12px;
    max-width: 52ch;
  }
  .scale {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .scale .edge-label {
    font-family: var(--font-display);
    font-size: 10px;
    color: var(--text-dim);
    width: 70px;
    line-height: 1.3;
  }
  .scale .edge-label.end { text-align: end; }
  .scale .dots {
    flex: 1;
    display: flex;
    justify-content: space-between;
  }
  .scale label {
    position: relative;
    width: 34px;
    height: 34px;
    border-radius: 50%;
    border: 1.5px solid var(--line);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text-dim);
    transition: border-color 0.15s ease, background 0.15s ease, color 0.15s ease;
  }
  .scale label:hover { border-color: var(--accent-soft); }
  .scale input { position: absolute; opacity: 0; width: 100%; height: 100%; cursor: pointer; margin: 0; }
  .scale label:has(input:checked) {
    background: var(--accent);
    border-color: var(--accent);
    color: var(--surface);
  }
  .scale label:has(input:focus-visible) {
    box-shadow: 0 0 0 2px var(--accent-soft);
  }

  .nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 8px;
    padding-top: 20px;
    border-top: 1px solid var(--line);
  }
  button {
    font-family: var(--font-display);
    font-size: 13px;
    font-weight: 700;
    padding: 12px 22px;
    border-radius: 3px;
    border: 1px solid var(--line);
    background: transparent;
    color: var(--text);
    cursor: pointer;
    transition: background 0.15s ease, border-color 0.15s ease, opacity 0.15s ease;
  }
  button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  button.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #0A0A0A;
    font-weight: 700;
  }
  button.primary:hover:not(:disabled) { background: var(--accent-soft); }
  button:disabled { opacity: 0.35; cursor: not-allowed; }
  button.ghost { border-color: transparent; color: var(--text-dim); padding: 12px 8px; }
  button.ghost:hover { color: var(--text); }

  .module { display: none; }
  .module.active { display: block; }

  #screen-intro, #screen-results { display: none; }
  #screen-intro.active, #screen-results.active { display: block; }

  /* Report */
  .report-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    border-bottom: 1px solid var(--line);
    padding-bottom: 18px;
    margin-bottom: 28px;
  }
  .report-header .header-label {
    font-family: var(--font-display);
    font-size: 13px;
    color: var(--text-dim);
  }
  .report-header .signal-badge { text-align: end; }
  .report-header .signal-badge .num {
    font-family: var(--font-mono);
    font-size: 30px;
    font-variant-numeric: tabular-nums;
    color: var(--accent);
    line-height: 1;
  }
  .report-header .signal-badge .lbl {
    font-family: var(--font-display);
    font-size: 10px;
    color: var(--text-dim);
  }

  .cluster-line {
    font-size: 16px;
    line-height: 1.6;
    margin-bottom: 32px;
  }
  .cluster-line strong { color: var(--accent); }

  .map-row {
    display: grid;
    grid-template-columns: 148px 1fr 34px;
    align-items: center;
    gap: 10px;
    margin-bottom: 7px;
  }
  .map-row .map-label {
    font-family: var(--font-display);
    font-size: 12px;
    color: var(--text-dim);
  }
  .map-row .map-track {
    height: 8px;
    background: var(--line);
    border-radius: 2px;
    overflow: hidden;
  }
  .map-row .map-fill { height: 100%; background: var(--accent); border-radius: 2px; }
  .map-row.low .map-fill { background: var(--grow); }
  .map-row .map-val {
    font-family: var(--font-mono);
    font-size: 12px;
    text-align: end;
    color: var(--text-dim);
    font-variant-numeric: tabular-nums;
  }

  .section-block { margin-top: 40px; }
  .section-block .section-intro {
    font-size: 15.5px;
    line-height: 1.7;
    margin-bottom: 24px;
    max-width: 58ch;
  }
  .strength-card {
    border-top: 1px solid var(--line);
    padding: 18px 0;
  }
  .strength-card h3 {
    font-family: var(--font-display);
    font-size: 14.5px;
    margin: 0 0 8px;
    display: flex;
    align-items: baseline;
    gap: 10px;
  }
  .strength-card h3 .rank {
    font-family: var(--font-mono);
    color: var(--text-dim);
    font-size: 11px;
  }
  .strength-card p {
    font-size: 15.5px;
    line-height: 1.65;
    margin: 0 0 10px;
    max-width: 58ch;
  }
  .try-this {
    background: var(--bg);
    border-inline-start: 2px solid var(--accent);
    padding: 10px 14px;
    font-size: 14px;
    line-height: 1.6;
    max-width: 56ch;
    margin-top: 10px;
  }
  .try-this .tag {
    font-family: var(--font-display);
    font-size: 10.5px;
    color: var(--accent);
    display: block;
    margin-bottom: 4px;
    font-weight: 700;
  }

  .closing-note {
    margin-top: 40px;
    padding-top: 20px;
    border-top: 1px solid var(--line);
    font-size: 14px;
    color: var(--text-dim);
    line-height: 1.65;
  }
  .result-actions {
    display: flex;
    justify-content: flex-start;
    margin-top: 28px;
  }
</style>
</head>
<body>

<main class="console">
  <span class="rivet-tl"></span><span class="rivet-tr"></span><span class="rivet-bl"></span><span class="rivet-br"></span>

  <div class="plate"><span>כיול <strong>מנהיגות</strong> VIA</span><span id="plate-status">המתנה</span></div>
  <div class="ticks" id="ticks"></div>

  <section id="screen-intro" class="active">
    <h1>שאלון VIA.</h1>
    <p class="sub">36 היגדים קצרים, מחולקים ל-12 מודולים. דרג/י עד כמה כל היגד מתאר אותך בעבודה. אין תשובות נכונות — הגיב/י לפי האינסטינקט הראשוני שלך.</p>
    <label class="field-label" for="participant-name">שם (יוצג בתוצאות שלך)</label>
    <input type="text" id="participant-name" placeholder="לדוגמה: אורטל קברטלר" autocomplete="off" />
    <p class="sub" style="margin-bottom:28px;">בסיום תראה/י מיד את הפרופיל המלא שלך כמנהיג/ה — איפה את/ה מוביל/ה כבר היום, ואיפה יש לך הכי הרבה מקום לצמוח.</p>
    <div class="nav" style="border-top:none; padding-top:0; justify-content:flex-start;">
      <button class="primary" id="btn-start">התחל/י </button>
    </div>
  </section>

  <div id="modules-root"></div>

  <section id="screen-results"></section>
</main>

    document.getElementById("btn-reset").addEventListener("click", function () {
      window.location.reload();
    });
  }

  goTo(-1);
})();
</script>
</body>
</html>
